<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact us</title>
    <link rel="stylesheet" href="./css/normalize.css" />
    <link rel="stylesheet" href="../css/contactus.css" />
    <link rel="icon" type="image/svg" href="./imgs/icon1.svg" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header>
      <nav>
        <div class="container navbar">
          <div class="logo">
            <a href="./index.html"
              ><img src="../imgs/sitelogo.svg" alt="sitelogo"
            /></a>
            <i class="fa-solid fa-bars"></i>

            <div class="linkes">
              <a href="../index.html">home</a>
              <a href="../pages/about.html">about</a>
            </div>
          </div>
          <a href="./contact.html">
            <button class="nav-btn">contact us</button></a
          >
        </div>
      </nav>
      <section class="contact-section">
        <div class="contact-wrapper">
          <div class="contact-info">
            <h1 class="heading">Contact</h1>
            <h2 class="sub-heading">Ask us about</h2>

            <div class="info-list">
              <div class="info-item">
                <img src="../imgs/icon1.svg" alt="icon" />
                <p>The quality of our talent network</p>
              </div>
              <div class="info-item">
                <img src="../imgs/icon2.svg" alt="icon" />
                <p>Usage & implementation of our software</p>
              </div>
              <div class="info-item">
                <img src="../imgs/icon3.svg" alt="icon" />
                <p>How we help drive innovation</p>
              </div>
            </div>
          </div>

          <div class="contact-form-container">
            <form class="contact-form">
              <div class="form-group">
                <input type="text" placeholder="Name" required />
              </div>
              <div class="form-group">
                <input type="email" placeholder="Email Address" required />
              </div>
              <div class="form-group">
                <input type="text" placeholder="Company Name" />
              </div>
              <div class="form-group">
                <input type="text" placeholder="Title" />
              </div>
              <div class="form-group">
                <textarea placeholder="Message" rows="2"></textarea>
              </div>
              <div class="btn-container">
                <button type="submit" class="submit-btn">submit</button>
              </div>
            </form>
          </div>
        </div>
      </section>
    </header>
    <main></main>
    <footer class="footer">
      <div class="footer-container container">
        <div class="colwrap">
          <div class="footer-col-1">
            <a href="./index.html">
              <img src="../imgs/sitelogo.svg" alt="sitelogo"
            /></a>
            <nav class="footer-nav">
              <a href="../index.html">home</a>
              <a href="./about.html">about</a>
            </nav>
          </div>

          <div class="footer-col-2">
            <p>987 Hillcrest Lane</p>
            <p>Irvine, CA</p>
            <p>California 92714</p>
            <p>Call Us : 949-833-7432</p>
          </div>

          <div class="footer-col-3">
            <div class="social-icons">
              <a href="https://www.facebook.com/" target="blank"
                ><i class="fa-brands fa-facebook"></i
              ></a>
              <a href="https://ru.pinterest.com/" target="blank"
                ><i class="fa-brands fa-pinterest"></i
              ></a>
              <a href="https://x.com/?lang=ru" target="blank"
                ><i class="fa-brands fa-twitter"></i
              ></a>
            </div>
            <p class="copyright">Copyright 2020. All Rights Reserved</p>
          </div>
        </div>
      </div>
    </footer>
  </body>
</html>
